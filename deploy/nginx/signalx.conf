# Nginx config for SignalX production on Hetzner
# Routes:
#   / → Expo web bundle (frontend container)
#   /api/* → FastAPI backend (port 8001)

upstream signalx_backend {
    server backend:8001;
}

upstream signalx_frontend {
    server frontend:80;
}

# HTTP → redirect to HTTPS (after Let's Encrypt cert is in place)
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Until cert is provisioned, serve over HTTP
    # After certbot success, switch the block below to redirect to HTTPS.
    location /api/ {
        proxy_pass http://signalx_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        client_max_body_size 25m;
    }

    location / {
        proxy_pass http://signalx_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip for static
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}

